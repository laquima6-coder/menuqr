<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MenuQR — Demo completo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#C9A84C;--dark:#0A0806;--d2:#141208;--d3:#1E1C14;--muted:#5A4A30;--green:#4A9A5A;}
html,body{width:100%;height:100%;overflow:hidden;background:#050402;font-family:'DM Sans',sans-serif;color:#FFF;}

#prog-bar{position:fixed;top:0;left:0;height:3px;background:var(--gold);width:0%;transition:none;z-index:1000;}

#stage{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 40px 60px;}

.phone{width:270px;background:#111;border-radius:36px;border:3px solid #2A2A2A;box-shadow:0 40px 100px rgba(0,0,0,.7),inset 0 0 0 1px #333;overflow:hidden;position:relative;flex-shrink:0;}
.phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:80px;height:22px;background:#111;border-radius:0 0 14px 14px;z-index:10;}
.phone-screen{min-height:500px;background:var(--dark);overflow:hidden;padding-top:22px;}

#text-area{text-align:center;max-width:900px;margin-top:16px;flex-shrink:0;}
#slide-num{font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
#slide-title{font-size:36px;font-weight:800;letter-spacing:-1px;line-height:1.1;margin-bottom:8px;}
#slide-desc{font-size:20px;color:#8A7A60;line-height:1.45;font-weight:400;}

#controls{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:14px;}
.ctrl-btn{width:40px;height:40px;border-radius:50%;background:#1A1612;border:1px solid #2A2210;color:#888;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;}
.ctrl-btn:hover{border-color:var(--gold);color:var(--gold);}
#dots{display:flex;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:#2A2210;cursor:pointer;transition:.2s;}
.dot.active{background:var(--gold);transform:scale(1.3);}

.app-header{display:flex;align-items:center;gap:10px;padding:14px 14px 8px;}
.app-emoji{font-size:28px;}
.app-name{font-size:15px;font-weight:800;color:#FFF;font-style:italic;}
.app-sub{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}

.cat-bar{display:flex;gap:6px;padding:6px 12px 8px;overflow:hidden;}
.ctab{font-size:9px;font-weight:700;padding:5px 11px;border-radius:12px;background:#141208;color:var(--muted);border:1px solid #1E1C14;flex-shrink:0;}
.ctab.on{background:var(--gold);color:#0A0806;border-color:var(--gold);}

.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:4px 12px;}
.pc{background:#141208;border-radius:10px;overflow:hidden;border:1px solid #1E1C14;}
.pc.glow{border-color:#C9A84C55;box-shadow:0 0 12px #C9A84C18;}
.pc-img{height:64px;display:flex;align-items:center;justify-content:center;font-size:28px;background:#0E0C08;position:relative;}
.pc-tag{position:absolute;top:4px;right:4px;font-size:7px;font-weight:800;padding:2px 5px;border-radius:3px;}
.tag-c{background:#C9A84C22;color:var(--gold);border:1px solid #C9A84C44;}
.tag-n{background:#4A9A5A22;color:#6ABD7A;border:1px solid #4A9A5A44;}
.pc-info{padding:6px 8px;}
.pc-name{font-size:10px;font-weight:700;color:#CCC;margin-bottom:2px;}
.pc-bot{display:flex;align-items:center;justify-content:space-between;}
.pc-price{font-size:11px;font-weight:800;color:var(--gold);}
.pc-add{width:20px;height:20px;border-radius:5px;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#0A0806;}
.qty-c{display:flex;align-items:center;gap:4px;}
.qb{width:18px;height:18px;border-radius:4px;background:#1E1C14;border:1px solid #2A2210;display:flex;align-items:center;justify-content:center;font-size:11px;color:#888;}
.qb.p{background:var(--gold);border-color:var(--gold);color:#0A0806;}
.qn{font-size:10px;font-weight:800;color:var(--gold);min-width:12px;text-align:center;}

.cart-box{background:#141208;border-radius:10px;padding:10px 12px;margin:6px 12px 0;}
.cart-row{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);padding:3px 0;}
.cart-total{display:flex;justify-content:space-between;font-size:13px;font-weight:800;color:#FFF;padding:6px 0 8px;border-top:1px solid #1E1C14;margin-top:4px;}
.cart-total span:last-child{color:var(--gold);}
.cart-btn{background:var(--gold);border-radius:8px;padding:9px;text-align:center;font-size:11px;font-weight:800;color:#0A0806;}

.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px;}
.pb{background:#0E0C08;border:1px solid #1E1C14;border-radius:7px;padding:6px 4px;text-align:center;font-size:8px;color:var(--muted);}
.pb.on{border-color:#C9A84C55;color:var(--gold);}
.pb-i{font-size:14px;display:block;margin-bottom:2px;}

.track-wrap{padding:12px 14px;}
.track-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.track-title{font-size:13px;font-weight:700;}
.track-live{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--green);background:#4A9A5A18;border:1px solid #4A9A5A33;border-radius:10px;padding:2px 7px;}
.tl-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.tstep{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:10px;border:1px solid transparent;margin-bottom:7px;}
.tstep.done{background:#C9A84C18;border-color:#C9A84C33;}
.tstep.now{background:#4A9A5A18;border-color:#4A9A5A44;}
.tstep.wait{opacity:.3;}
.ts-icon{font-size:18px;flex-shrink:0;}
.ts-info{flex:1;}
.ts-label{font-size:11px;font-weight:700;color:#EEE;}
.ts-sub{font-size:9px;color:var(--muted);}
.ts-dot{width:7px;height:7px;border-radius:50%;}
.ts-dot.g{background:var(--gold);}
.ts-dot.v{background:var(--green);box-shadow:0 0 6px var(--green);}
.ts-dot.w{background:#3A2A10;}

.qrv-screen{padding:14px;}
.qrv-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
.qrv-list{display:flex;flex-direction:column;gap:6px;}
.qrv-item{background:#141208;border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px;}
.qrv-e{font-size:20px;flex-shrink:0;}
.qrv-d{flex:1;}
.qrv-n{font-size:11px;font-weight:700;color:#CCC;}
.qrv-p{font-size:10px;color:var(--gold);}

.pc-layout{display:flex;height:500px;background:var(--dark);}
.pc-left{width:90px;flex-shrink:0;background:#0E0C08;border-right:1px solid #1A1612;padding:10px 0;}
.pc-logo-sm{padding:8px 10px;border-bottom:1px solid #1A1612;margin-bottom:8px;text-align:center;}
.pc-logo-sm .e{font-size:20px;}
.pc-logo-sm .n{font-size:8px;font-weight:800;color:#FFF;font-style:italic;}
.pc-cat-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 6px;border-left:2px solid transparent;}
.pc-cat-item.on{border-left-color:var(--gold);}
.pc-cat-item .ci{font-size:16px;}
.pc-cat-item .cl{font-size:7px;color:var(--muted);}
.pc-cat-item.on .cl{color:var(--gold);}
.pc-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.pc-tabs{display:flex;gap:5px;padding:8px 10px;border-bottom:1px solid #1A1612;}
.pc-t{font-size:8px;font-weight:700;padding:4px 10px;border-radius:10px;background:#141208;color:var(--muted);border:1px solid #1E1C14;}
.pc-t.on{background:var(--gold);color:#0A0806;border-color:var(--gold);}
.pc-feat{background:#141208;border:1px solid #2A2210;border-radius:10px;padding:10px 14px;margin:8px 10px;display:flex;gap:12px;align-items:center;}
.pc-feat-e{font-size:32px;}
.pc-feat-inf .badge{font-size:7px;font-weight:800;color:var(--gold);letter-spacing:1px;margin-bottom:4px;}
.pc-feat-inf .fn{font-size:12px;font-weight:800;color:#FFF;margin-bottom:2px;}
.pc-feat-inf .fp{font-size:14px;color:var(--gold);}
.pc-pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;padding:0 10px;}
.pcg{background:#141208;border-radius:8px;overflow:hidden;border:1px solid #1E1C14;}
.pcg-img{height:45px;display:flex;align-items:center;justify-content:center;font-size:20px;background:#0E0C08;}
.pcg-info{padding:5px 6px;}
.pcg-n{font-size:8px;font-weight:700;color:#CCC;}
.pcg-p{font-size:9px;font-weight:800;color:var(--gold);}
.pc-right{width:80px;flex-shrink:0;background:#0E0C08;border-left:1px solid #1A1612;padding:8px;}
.pc-right-title{font-size:7px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
.pc-cart-item{display:flex;gap:4px;align-items:center;padding:4px 0;border-bottom:1px solid #1A1612;}
.pc-ci-e{font-size:12px;}
.pc-ci-d{flex:1;}
.pc-ci-n{font-size:7px;color:#CCC;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.pc-ci-p{font-size:7px;color:var(--gold);}
.pc-total{font-size:10px;font-weight:800;color:var(--gold);text-align:right;margin-top:6px;}
.pc-order-btn{background:var(--gold);border-radius:6px;padding:6px;text-align:center;font-size:7px;font-weight:800;color:#0A0806;margin-top:6px;}

.multi-screen{padding:14px;}
.multi-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
.multi-item{background:#141208;border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;margin-bottom:7px;border:1px solid #1E1C14;}
.mi-e{font-size:22px;}
.mi-d{flex:1;}
.mi-n{font-size:12px;font-weight:700;color:#EEE;}
.mi-u{font-size:9px;color:var(--muted);}
.mi-dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
.mi-dot.off{background:#3A2A10;}

.qr-scan{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center;gap:14px;}
.qr-icon-big{font-size:80px;}
.qr-beam{width:180px;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);animation:scan 2s ease-in-out infinite;}
@keyframes scan{0%,100%{transform:translateY(-40px);opacity:0}50%{transform:translateY(40px);opacity:1}}
.qr-label{font-size:14px;font-weight:700;color:#EEE;}
.qr-sub-txt{font-size:10px;color:var(--muted);line-height:1.6;}

.confirm-screen{padding:18px 14px;text-align:center;}
.confirm-icon{font-size:56px;margin-bottom:12px;}
.confirm-title{font-size:16px;font-weight:800;color:#FFF;margin-bottom:6px;}
.confirm-sub{font-size:10px;color:var(--muted);line-height:1.6;margin-bottom:14px;}
.confirm-order-num{background:#141208;border:1px solid var(--gold);border-radius:10px;padding:10px 16px;font-size:22px;font-weight:800;color:var(--gold);margin-bottom:14px;}
.confirm-msg{font-size:10px;color:#3A2A10;font-style:italic;}

.kitchen-screen{padding:12px;}
.kitch-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.kitch-title{font-size:13px;font-weight:700;color:#FFF;}
.kitch-badge{font-size:8px;background:#C9A84C22;color:var(--gold);border:1px solid #C9A84C44;border-radius:8px;padding:2px 8px;}
.kitch-order{background:#141208;border:1px solid #2A2210;border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.ko-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.ko-num{font-size:12px;font-weight:800;color:var(--gold);}
.ko-status{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;}
.ko-status.prep{background:#4A9A5A22;color:#6ABD7A;border:1px solid #4A9A5A44;}
.ko-item{display:flex;gap:8px;font-size:10px;color:#CCC;padding:3px 0;}
.ko-item-e{font-size:14px;}
.ko-obs{font-size:9px;color:var(--muted);font-style:italic;margin-top:4px;}
.ko-btn{background:var(--green);border-radius:7px;padding:7px;text-align:center;font-size:10px;font-weight:700;color:#FFF;margin-top:8px;}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease forwards;}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.slide-in{animation:slideLeft .4s ease forwards;}
</style>
</head>
<body>

<div id="prog-bar"></div>

<div id="stage">
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="phone-screen" id="phone-screen"></div>
  </div>
  <div id="text-area">
    <div id="slide-num"></div>
    <div id="slide-title"></div>
    <div id="slide-desc"></div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="prev()">&#9664;</button>
  <div id="dots"></div>
  <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">&#9646;&#9646;</button>
  <button class="ctrl-btn" onclick="next()">&#9654;</button>
</div>

<script>
const SLIDES = [
  {
    num:"FUNCION 01 DE 16",
    title:"El cliente escanea el QR",
    desc:"Desde la mesa o la vitrina del local. Sin app, sin descarga. Solo abre la camara del celular.",
    screen(){return`<div class="qr-scan fade-in"><div class="qr-icon-big">&#128241;</div><div class="qr-beam"></div><div class="qr-label">Escanear para ver la carta</div><div class="qr-sub-txt">menuqr-ten.vercel.app/el-porteno<br>Acceso instantaneo &middot; Sin registro</div></div>`}
  },
  {
    num:"FUNCION 02 DE 16",
    title:"Carta digital completa",
    desc:"El menu entero con nombre, descripcion y precio de cada plato. Actualizable en cualquier momento.",
    screen(){return`<div class="fade-in"><div class="app-header"><div class="app-emoji">&#127789;</div><div><div class="app-name">El Porte&ntilde;o</div><div class="app-sub">Pancher&iacute;a</div></div></div><div class="cat-bar"><div class="ctab on">Todo</div><div class="ctab">&#127789; Panchos</div><div class="ctab">&#127828; Burger</div><div class="ctab">&#129385; Milan.</div></div><div class="prod-grid"><div class="pc"><div class="pc-img">&#127789;<span class="pc-tag tag-c">CHEF</span></div><div class="pc-info"><div class="pc-name">Pancho Especial</div><div class="pc-bot"><span class="pc-price">$3.800</span><div class="pc-add">+</div></div></div></div><div class="pc"><div class="pc-img">&#127828;<span class="pc-tag tag-c">CHEF</span></div><div class="pc-info"><div class="pc-name">Hamburguesa Doble</div><div class="pc-bot"><span class="pc-price">$6.500</span><div class="pc-add">+</div></div></div></div><div class="pc"><div class="pc-img">&#129385;<span class="pc-tag tag-n">NUEVO</span></div><div class="pc-info"><div class="pc-name">Lomito</div><div class="pc-bot"><span class="pc-price">$5.800</span><div class="pc-add">+</div></div></div></div><div class="pc"><div class="pc-img">&#127839;</div><div class="pc-info"><div class="pc-name">Papas Cheddar</div><div class="pc-bot"><span class="pc-price">$3.200</span><div class="pc-add">+</div></div></div></div></div></div>`}
  },
  {
    num:"FUNCION 03 DE 16",
    title:"Filtro por categorias",
    desc:"Tabs fijos arriba: Panchos, Hamburguesas, Milanesas, Papas, Bebidas. Un tap filtra al instante.",
    screen(){return`<div class="fade-in"><div class="app-header"><div class="app-emoji">&#127789;</div><div><div class="app-name">El Porte&ntilde;o</div><div class="app-sub">Pancher&iacute;a</div></div></div><div class="cat-bar"><div class="ctab">Todo</div><div class="ctab on">&#127789; Panchos</div><div class="ctab">&#127828; Burger</div><div class="ctab">&#129385; Milan.</div><div class="ctab">&#127839; Papas</div></div><div class="prod-grid"><div class="pc"><div class="pc-img">&#127789;</div><div class="pc-info"><div class="pc-name">Pancho Clasico</div><div class="pc-bot"><span class="pc-price">$2.500</span><div class="pc-add">+</div></div></div></div><div class="pc"><div class="pc-img">&#127789;</div><div class="pc-info"><div class="pc-name">Pancho Completo</div><div class="pc-bot"><span class="pc-price">$3.200</span><div class="pc-add">+</div></div></div></div><div class="pc"><div class="pc-img">&#127789;<span class="pc-tag tag-c">CHEF</span></div><div class="pc-info"><div class="pc-name">Pancho Especial</div><div class="pc-bot"><span class="pc-price">$3.800</span><div class="pc-add">+</div></div></div></div><div class="pc"><div class="pc-img">&#127789;</div><div class="pc-info"><div class="pc-name">Pancho XXL</div><div class="pc-bot"><span class="pc-price">$4.200</span><div class="pc-add">+</div></div></div></div></div></div>`}
  },
  {
    num:"FUNCION 04 DE 16",
    title:"Agregar productos al carrito",
    desc:"El cliente suma productos con el boton +. El carrito se arma abajo con el total en tiempo real.",
    screen(){return`<div class="fade-in"><div class="app-header"><div class="app-emoji">&#127789;</div><div><div class="app-name">El Porte&ntilde;o</div><div class="app-sub">Pancher&iacute;a</div></div></div><div class="cat-bar"><div class="ctab on">Todo</div><div class="ctab">&#127789;</div><div class="ctab">&#127828;</div></div><div class="prod-grid"><div class="pc glow"><div class="pc-img">&#127789;<span class="pc-tag tag-c">CHEF</span></div><div class="pc-info"><div class="pc-name">Pancho Especial</div><div class="pc-bot"><span class="pc-price">$3.800</span><div class="qty-c"><div class="qb">&minus;</div><div class="qn">2</div><div class="qb p">+</div></div></div></div></div><div class="pc"><div class="pc-img">&#127828;<span class="pc-tag tag-c">CHEF</span></div><div class="pc-info"><div class="pc-name">Hamburguesa Doble</div><div class="pc-bot"><span class="pc-price">$6.500</span><div class="pc-add">+</div></div></div></div><div class="pc glow"><div class="pc-img">&#127839;</div><div class="pc-info"><div class="pc-name">Papas Cheddar</div><div class="pc-bot"><span class="pc-price">$3.200</span><div class="qty-c"><div class="qb">&minus;</div><div class="qn">1</div><div class="qb p">+</div></div></div></div></div><div class="pc"><div class="pc-img">&#129379;</div><div class="pc-info"><div class="pc-name">Gaseosa</div><div class="pc-bot"><span class="pc-price">$1.200</span><div class="pc-add">+</div></div></div></div></div><div class="cart-box"><div class="cart-row"><span>Pancho Especial &times;2</span><span>$7.600</span></div><div class="cart-row"><span>Papas Cheddar &times;1</span><span>$3.200</span></div><div class="cart-total"><span>TOTAL</span><span>$10.800</span></div></div></div>`}
  },
  {
    num:"FUNCION 05 DE 16",
    title:"Elegir forma de pago",
    desc:"Efectivo, tarjeta, QR / MercadoPago o cuenta corriente. El cliente elige y confirma el pedido.",
    screen(){return`<div class="fade-in" style="padding:12px;"><div style="font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;">&#128722; Tu pedido</div><div style="background:#141208;border-radius:10px;padding:10px 12px;margin-bottom:10px;"><div class="cart-row"><span>&#127789; Pancho Especial &times;2</span><span>$7.600</span></div><div class="cart-row"><span>&#127839; Papas Cheddar &times;1</span><span>$3.200</span></div><div class="cart-row"><span>&#127828; Hamburguesa Doble &times;1</span><span>$6.500</span></div><div class="cart-total"><span>TOTAL</span><span>$17.300</span></div></div><div style="font-size:9px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;">Forma de pago</div><div class="pay-grid"><div class="pb"><span class="pb-i">&#128181;</span>Efectivo</div><div class="pb on"><span class="pb-i">&#128179;</span>Tarjeta</div><div class="pb"><span class="pb-i">&#128241;</span>QR / MP</div><div class="pb"><span class="pb-i">&#129534;</span>Cuenta</div></div><div class="cart-btn">Confirmar pedido &rarr;</div></div>`}
  },
  {
    num:"FUNCION 06 DE 16",
    title:"Pedido confirmado — llega a cocina",
    desc:"El pedido llega al instante a caja y a la pantalla de cocina. El cliente ve el numero de su pedido.",
    screen(){return`<div class="confirm-screen fade-in"><div class="confirm-icon">&#10003;&#65039;</div><div class="confirm-title">Pedido enviado!</div><div class="confirm-sub">Tu pedido llego a la cocina.<br>Podes seguir el estado aca mismo.</div><div class="confirm-order-num"># 47</div><div class="confirm-msg">Avisamos cuando este listo</div></div>`}
  },
  {
    num:"FUNCION 07 DE 16",

let cur=0, paused=false, timer=null;

function show(i){
  cur=i;
  const s=SLIDES[i];
  document.getElementById('phone-screen').innerHTML=s.screen();
  document.getElementById('slide-num').textContent=s.num;
  document.getElementById('slide-title').textContent=s.title;
  document.getElementById('slide-desc').textContent=s.desc;
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  startProg();
}

function startProg(){
  const bar=document.getElementById('prog-bar');
  bar.style.transition='none';
  bar.style.width='0%';
  clearTimeout(timer);
  if(paused)return;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bar.style.transition='width 8s linear';
    bar.style.width='100%';
  }));
  timer=setTimeout(()=>show((cur+1)%SLIDES.length),8000);
}

function next(){clearTimeout(timer);show((cur+1)%SLIDES.length);}
function prev(){clearTimeout(timer);show((cur-1+SLIDES.length)%SLIDES.length);}
function togglePause(){
  paused=!paused;
  document.getElementById('pause-btn').innerHTML=paused?'&#9654;':'&#9646;&#9646;';
  if(!paused){startProg();}else{
    clearTimeout(timer);
    const bar=document.getElementById('prog-bar');
    const w=bar.getBoundingClientRect().width/document.body.getBoundingClientRect().width*100;
    bar.style.transition='none';
    bar.style.width=w+'%';
  }
}

const dc=document.getElementById('dots');
SLIDES.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  d.onclick=()=>{clearTimeout(timer);show(i);};
  dc.appendChild(d);
});

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')next();
  else if(e.key==='ArrowLeft')prev();
  else if(e.key===' '){e.preventDefault();togglePause();}
});

show(0);
</script>
